<!DOCTYPE html>
<html lang="it" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Privata | Plot Twisters!</title>
    <meta name="description" content="Accedi o registrati al club Plot Twisters per scrivere sul tuo diario di bordo e scaricare i PDF.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Cormorant:ital,wght@1,300;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom styles for the auth switcher */
        .auth-mode-selector {
            display: flex;
            background: var(--ivory-2);
            border-radius: var(--r-sm);
            padding: 0.25rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }
        .auth-mode-btn {
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: calc(var(--r-sm) - 2px);
            transition: all 0.3s var(--ease);
            color: var(--plum-light);
        }
        .auth-mode-btn.active {
            background: var(--white);
            color: var(--lilac-deep);
            box-shadow: var(--shadow-xs);
        }
        .form-field {
            margin-bottom: 1.25rem;
        }
        .hidden-field {
            display: none;
        }
        .login-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--lilac-deep);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            transition: transform 0.3s var(--ease);
        }
        .login-back:hover {
            transform: translateX(-4px);
        }
    </style>
</head>

<body>
    <!-- Page Loader -->
    <div class="page-loader" id="page-loader">
        <div class="loader-brand">Plot Twisters<span class="dot">!</span></div>
    </div>

    <div class="login-page">

        <!-- LEFT: Decorative Panel -->
        <div class="login-deco">
            <div class="login-deco-brand">Plot Twisters<span>!</span></div>
            <p class="login-deco-tagline">dove la magia prende vita, pagina dopo pagina</p>
            <div class="login-deco-dots">
                <span class="active"></span>
                <span></span>
                <span></span>
            </div>
            <div style="position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden" id="login-particles"></div>
        </div>

        <!-- RIGHT: Form Side -->
        <div class="login-form-side">
            <div class="login-form-card">
                
                <!-- Explicit Back to Home link -->
                <a href="index.html" class="login-back" title="Torna alla Homepage del sito">
                    <i class="fas fa-arrow-left"></i> Torna alla Home
                </a>

                <h1 id="auth-title">Benvenuta <em>di nuovo</em></h1>
                <p class="login-form-subtitle" id="auth-subtitle">Accedi alla tua area personale ☕</p>

                <!-- Dynamic Auth Switcher -->
                <div class="auth-mode-selector">
                    <button type="button" class="auth-mode-btn active" id="mode-login-btn" onclick="setMode('login')">Accedi</button>
                    <button type="button" class="auth-mode-btn" id="mode-register-btn" onclick="setMode('register')">Crea Account</button>
                </div>

                <form class="login-form" id="login-form" novalidate>
                    
                    <!-- Dynamic Name Field (shown only in register mode) -->
                    <div class="form-field hidden-field" id="field-name">
                        <label for="login-name">Il tuo Nome</label>
                        <input
                            type="text"
                            id="login-name"
                            placeholder="es. Giulia"
                            autocomplete="name"
                        >
                    </div>

                    <div class="form-field">
                        <label for="login-email">Indirizzo Email</label>
                        <input
                            type="email"
                            id="login-email"
                            placeholder="la.tua@email.com"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="form-field">
                        <label for="login-password">Password</label>
                        <input
                            type="password"
                            id="login-password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <div class="login-error hidden" id="login-error">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="login-error-msg">Email o password errata.</span>
                    </div>

                    <button type="submit" class="btn-primary login-submit" id="login-submit-btn" style="width: 100%; justify-content: center;">
                        Accedi <i class="fas fa-arrow-right"></i>
                    </button>

                </form>

                <p class="login-footer-note" style="margin-top: 1.5rem;">
                    Sei una nuova membro del club? Clicca su <strong>"Crea Account"</strong> in alto per registrarti all'istante ed entrare nel diario!
                </p>

                <!-- Dark mode toggle -->
                <div style="margin-top: 2rem; display: flex; justify-content: center;">
                    <button class="theme-toggle" id="theme-toggle-login" title="Cambia tema">🌙</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Firebase SDKs (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="login.js"></script>
</body>

</html>
