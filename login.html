<!DOCTYPE html>
<html lang="it" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Privata | Plot Twisters!</title>
    <meta name="description" content="Accedi all'area privata del club Plot Twisters.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Cormorant:ital,wght@1,300;1,400;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-field {
            margin-bottom: 1.25rem;
        }

        .login-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--lilac-deep);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            transition: transform 0.3s var(--ease);
            text-decoration: none;
        }

        .login-back:hover {
            transform: translateX(-4px);
        }

        /* User selector pills */
        .user-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 2px solid var(--border);
            background: var(--white);
            color: var(--plum-dark);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s var(--ease);
        }

        .user-pill:hover {
            border-color: var(--lilac-mid);
            background: var(--ivory-2);
        }

        .user-pill.selected {
            border-color: var(--lilac-deep);
            background: var(--lilac-deep);
            color: white;
        }

        .user-pill .avatar-sm {
            width: 1.6rem;
            height: 1.6rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .user-pill.selected .avatar-sm {
            background: rgba(255, 255, 255, 0.3);
        }

        .select-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--plum-light);
            margin-bottom: 0.6rem;
        }
    </style>
</head>

<body>
    <div class="page-loader" id="page-loader">
        <div class="loader-brand">Plot Twisters<span class="dot">!</span></div>
    </div>

    <div class="login-page">
        <!-- LEFT: Decorative Panel -->
        <div class="login-deco">
            <div class="login-deco-brand">Plot Twisters<span>!</span></div>
            <p class="login-deco-tagline">dove la magia prende vita, pagina dopo pagina</p>
            <div class="login-deco-dots">
                <span class="active"></span><span></span><span></span>
            </div>
            <div style="position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden" id="login-particles">
            </div>
        </div>

        <!-- RIGHT: Form Side -->
        <div class="login-form-side">
            <div class="login-form-card">

                <a href="index.html" class="login-back" title="Torna alla Homepage">
                    <i class="fas fa-arrow-left"></i> Torna alla Home
                </a>

                <h1>Benvenuta <em>di nuovo</em></h1>
                <p class="login-form-subtitle">Scegli il tuo nome e inserisci la password ☕</p>

                <form class="login-form" id="login-form" novalidate>

                    <!-- Selezione Utente -->
                    <div style="margin-bottom:1.5rem;">
                        <p class="select-label">Chi sei?</p>
                        <div id="user-scroll" class="user-scroll"
                            style="margin-bottom:1.5rem; overflow-x:auto; white-space:nowrap;">
                            <!-- User pills will be populated by login.js -->
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-field">
                        <label for="login-password">La tua Password</label>
                        <input type="password" id="login-password" placeholder="••••••••"
                            autocomplete="current-password" required>
                    </div>

                    <div class="login-error hidden" id="login-error">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="login-error-msg">Password errata. Riprova!</span>
                    </div>

                    <button type="submit" class="btn-primary login-submit" id="login-submit-btn"
                        style="width:100%;justify-content:center;">
                        Accedi <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <p class="login-footer-note" style="margin-top:1.5rem;font-size:0.85rem;color:var(--plum-light);">
                    Non trovi il tuo nome o hai dimenticato la password? Contatta le admin! 🔑
                </p>

                <div style="margin-top:2rem;display:flex;justify-content:center;">
                    <button class="theme-toggle" id="theme-toggle-login" title="Cambia tema">🌙</button>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
